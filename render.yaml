services:
  - type: web
    name: talentsync-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RENDER
        value: true
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: AI_Resume
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MIN
        value: 60
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
